version: '3.8'

services:
  backend:
    build: ./backend
    container_name: agent_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./model_cache:/app/model_cache  # Persist/share model cache if needed
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=agent_db
      - MODELSCOPE_CACHE=/app/model_cache
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: agent_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: mysql:8.0
    container_name: agent_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: agent_db
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db_data:
